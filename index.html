<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《夢溪筆談》總複習 自我測驗</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #ffffff;
        }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: #f8f9fa; color: #333; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        
        /* 學生資訊 */
        .info-box { background: #f1f3f5; border-radius: 10px; padding: 15px; margin-bottom: 20px; display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }
        .info-box div.full { grid-column: span 2; }
        label { font-size: 0.8rem; font-weight: bold; color: #666; display: block; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }

        /* 題目樣式 */
        .q-card { border: 1px solid #eee; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; color: white; background: #8e44ad; margin-bottom: 10px; }
        .options { display: grid; gap: 10px; margin-top: 15px; }
        .opt-btn { background: #fff; border: 2px solid #f0f0f0; padding: 12px; border-radius: 8px; text-align: left; cursor: pointer; transition: 0.2s; }
        .opt-btn.selected { border-color: var(--accent); background-color: #ebf5fb; font-weight: bold; }

        /* 按鈕樣式 */
        #submit-btn { width: 100%; background: var(--primary); color: white; padding: 18px; border: none; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* 結果與診斷報告 */
        #result-area { display: none; }
        .score-box { text-align: center; margin-bottom: 30px; }
        .score-num { font-size: 4rem; color: var(--success); font-weight: bold; }
        
        .review-item { padding: 15px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #eee; border-left-width: 6px; }
        .review-item.correct { border-left-color: var(--success); background: #f0fff4; }
        .review-item.wrong { border-left-color: var(--error); background: #fff5f5; }
        .status-label { font-weight: bold; margin-bottom: 5px; display: block; }
        .correct-text { color: var(--success); font-weight: bold; }
        .wrong-text { color: var(--error); font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="quiz-container">
    <h2 style="text-align:center">《夢溪筆談》總複習自我測驗</h2>
    <div class="info-box">
        <div><label>班級</label><input type="text" id="stu-class" placeholder="例: 811"></div>
        <div><label>座號</label><input type="number" id="stu-no" placeholder="例: 01"></div>
        <div class="full"><label>姓名</label><input type="text" id="stu-name" placeholder="請輸入姓名"></div>
    </div>
    <div id="questions-list"></div>
    <button id="submit-btn" onclick="processResults()">完成交卷並查看診斷</button>
</div>

<div class="container" id="result-area">
    <div class="score-box">
        <h2>測驗完成！您的得分</h2>
        <div class="score-num" id="final-score">0</div>
        <hr>
        <h3 style="text-align:left">作答診斷報告：</h3>
    </div>
    <div id="review-list"></div>
    <button onclick="location.reload()" style="width:100%; padding:10px; margin-top:20px; border-radius:8px; cursor:pointer;">重新測驗挑戰</button>
</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
// 夢溪筆談精華題庫
const questionBank = [
    { t: "作者背景", q: "《夢溪筆談》的作者沈括生活在古代哪一個朝代？", a: "北宋", b: "南宋", c: "A" },
    { t: "科學發現", q: "沈括在書中記載指南針指向並非正南方，這種現象在科學史上稱為？", a: "磁偏角", b: "磁極反轉", c: "A" },
    { t: "科學發現", q: "如何從畫中貓的眼睛形狀判定為正午時分？", a: "黑睛細如一條線", b: "黑睛呈圓形", c: "A" },
    { t: "鑑賞觀念", q: "在書畫鑑賞中，沈括提到的「耳鑑」是指什麼行為？", a: "只聽取名聲，爭相購買名家作品而不看作品本身", b: "透過敲擊聲音判定畫作優劣", c: "A" },
    { t: "科學工藝", q: "沈括認為最理想的指南針懸掛法為何？", a: "以單繭絲黏綴針腰懸掛", b: "置於指甲或碗邊", c: "A" },
    { t: "科學發現", q: "根據《夢溪筆談》，「鑑窪」(凹面鏡) 照人面時呈現的影像為何？", a: "影像變大", b: "影像變小", c: "A" },
    { t: "科學發現", q: "根據《夢溪筆談》，「凸鑑」(凸面鏡) 照人面時呈現的影像為何？", a: "影像變小", b: "影像變大", c: "A" },
    { t: "工程技術", q: "沈括記載了古代製作小鏡時表面「微凸」，其主要目的是？", a: "縮小人臉影像，使鏡面能容納完整臉部", b: "放大細部特徵", c: "A" },
    { t: "工程技術", q: "沈括記載早期龍船長期留在水中的缺點為何？", a: "船底容易腐爛 (歲久腹敗)", b: "船體容易長滿海苔導致速度變慢", c: "A" },
    { t: "科學觀察", q: "帶有露水的牡丹花在畫面上應呈現何種形態才是合理的？", a: "花房收斂且色澤潤澤", b: "花瓣張開且顏色乾燥", c: "A" },
    { t: "科學發現", q: "沈括在指南針實驗中，如何將絲線固定在針上？", a: "使用芥子大小的蠟", b: "使用強力膠水", c: "A" },
    { t: "工藝技術", q: "沈括認為古鑑磨平後會造成什麼後果？", a: "損壞原有聲響 (傷知音)", b: "讓鏡面更清晰", c: "A" },
    { t: "地理科學", q: "沈括對於指南針偏向的原因，在書中展現的態度為何？", a: "認為其理無法窮盡與解釋", b: "提出完整的物理磁場公式", c: "A" },
    { t: "科學評價", q: "英國科學史家李約瑟如何評價《夢溪筆談》？", a: "中國科學史上的座標", b: "東方最具野心的文學集", c: "A" },
    { t: "科學發現", q: "沈括觀察貓眼在早晨或黃昏時，眼睛形狀為何？", a: "圓形", b: "線形", c: "A" }
];

// 隨機選取 15 題
let selected = questionBank.sort(() => 0.5 - Math.random()).slice(0, 15);
let userAnswers = {};

// 渲染題目
const listEl = document.getElementById('questions-list');
selected.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.innerHTML = `
        <span class="tag">${item.t}相關</span>
        <div style="font-weight:bold">${i+1}. ${item.q}</div>
        <div class="options">
            <button class="opt-btn" onclick="pick(${i}, 'A', this)">(A) ${item.a}</button>
            <button class="opt-btn" onclick="pick(${i}, 'B', this)">(B) ${item.b}</button>
        </div>
    `;
    listEl.appendChild(card);
});

function pick(i, val, btn) {
    userAnswers[i] = val;
    Array.from(btn.parentElement.children).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
}

function processResults() {
    const cls = document.getElementById('stu-class').value;
    const no = document.getElementById('stu-no').value;
    const name = document.getElementById('stu-name').value;

    if(!cls || !no || !name) { alert("請填妥基本資料！"); return; }
    if(Object.keys(userAnswers).length < 15) { alert("題目還沒做完喔！"); return; }

    let score = 0;
    const reviewList = document.getElementById('review-list');
    reviewList.innerHTML = "";

    selected.forEach((item, i) => {
        const isCorrect = userAnswers[i] === item.c;
        if(isCorrect) score += Math.round(100/15);

        const div = document.createElement('div');
        div.className = `review-item ${isCorrect ? 'correct' : 'wrong'}`;
        
        const userLabel = isCorrect ? '<span class="correct-text">正確 (✓)</span>' : '<span class="wrong-text">錯誤 (✗)</span>';
        const correctText = item.c === 'A' ? item.a : item.b;
        const userText = userAnswers[i] === 'A' ? item.a : item.b;

        div.innerHTML = `
            <span class="status-label">第 ${i+1} 題：${userLabel}</span>
            <div style="font-size:0.95rem; margin-bottom:8px;">${item.q}</div>
            <div style="font-size:0.85rem; color:#666;">
                您的選擇：<span class="${isCorrect ? 'correct-text' : 'wrong-text'}">${userText}</span><br>
                正確答案：<span class="correct-text">${correctText}</span>
            </div>
        `;
        reviewList.appendChild(div);
    });

    // 送出至 Google 表單 (請核對 ID)
    const formID = "1FAIpQLSeKwAK1Zama9OYbUrgThIbhncSMrehNlQ4r7dZMnq8zB2ZwKA";
    const entries = {
        "entry.646282508": cls,
        "entry.1247241398": no,
        "entry.923003213": name,
        "entry.1489395625": score
    };

    const form = document.createElement('form');
    form.method = "POST";
    form.action = `https://docs.google.com/forms/d/e/${formID}/formResponse`;
    form.target = "hidden_iframe";
    for(let key in entries) {
        let input = document.createElement('input');
        input.type="hidden"; input.name=key; input.value=entries[key];
        form.appendChild(input);
    }
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);

    // 切換介面
    document.getElementById('quiz-container').style.display = 'none';
    document.getElementById('result-area').style.display = 'block';
    document.getElementById('final-score').innerText = score;
    window.scrollTo(0,0);
}
</script>
</body>
</html>
