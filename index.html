<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《夢溪筆談》測驗</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #ffffff; color: #333; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; color: white; margin-bottom: 8px; }
        .tag-author { background-color: #3498db; } .tag-science { background-color: #27ae60; } .tag-logic { background-color: #e67e22; }
        .question-card { border: 1px solid #eee; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .options { display: grid; gap: 10px; }
        button { border: 2px solid #eee; background: white; padding: 12px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        button.selected { border-color: #3498db; background-color: #ebf5fb; }
        #submit-btn { width: 100%; background: #2c3e50; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 1.2rem; margin: 20px 0; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0 20px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        #result-area { display: none; text-align: center; padding-top: 50px; }
    </style>
</head>
<body>
<div class="container" id="quiz-container">
    <h2 style="text-align:center">《夢溪筆談》自我測驗</h2>
    <label>請輸入您的姓名：</label>
    <input type="text" id="student-name" placeholder="請填寫姓名">
    <div id="questions-list"></div>
    <button id="submit-btn" onclick="calculateScore()">完成並送出分數</button>
</div>

<div class="container" id="result-area">
    <h1>測驗完成！</h1>
    <p>您的分數是：</p>
    <p style="font-size: 4rem; color: #e74c3c;" id="final-score">0</p>
    <p>分數已自動回傳給老師，可以關閉網頁了。</p>
</div>

<script>
const fullBank = [
    { q: "《夢溪筆談》的作者是誰？", a: "沈括", b: "宋應星", correct: "a", cat: "author", tag: "作者/國學" },
    { q: "沈括生活於哪一個朝代？", a: "北宋", b: "南宋", correct: "a", cat: "author", tag: "作者/國學" },
    { q: "英國科學史家李約瑟如何評價《夢溪筆談》？", a: "中國科學史上的座標", b: "東方百科全書", correct: "a", cat: "author", tag: "作者/國學" },
    { q: "哪兩部著作同為中國古代科技的重要文獻？", a: "《夢溪筆談》與《天工開物》", b: "《夢溪筆談》與《本草綱目》", correct: "a", cat: "author", tag: "作者/國學" },
    { q: "在書畫鑑賞中，「耳鑑」是指什麼樣的行為？", a: "只聽取名聲，不看作品本身", b: "透過聲音判定畫作優劣", correct: "a", cat: "logic", tag: "文意理解" },
    { q: "「揣骨聽聲」在畫作鑑賞中指的是什麼？", a: "透過觸摸色調或聽音判定", b: "觀察畫中人物骨骼", correct: "a", cat: "logic", tag: "文意理解" },
    { q: "古畫中牡丹「其花披哆而色燥」，代表什麼時分？", a: "正午", b: "清晨", correct: "a", cat: "logic", tag: "文意理解" },
    { q: "如何從畫中貓眼判定為正午？", a: "黑睛細如一條線", b: "黑睛呈圓形", correct: "a", cat: "science", tag: "科學常識" },
    { q: "早晨或黃昏時，貓的眼睛形狀為何？", a: "圓形", b: "線形", correct: "a", cat: "science", tag: "科學常識" },
    { q: "將磁石磨針鋒後，針鋒會產生什麼現象？", a: "能指向南方", b: "失去磁性", correct: "a", cat: "science", tag: "科學常識" },
    { q: "指南針若使用「水浮法」，缺點為何？", a: "水面易搖晃不穩", b: "針會沉入水底", correct: "a", cat: "science", tag: "科學常識" },
    { q: "沈括發現指南針指向並非正南，而是？", a: "微偏向東方", b: "微偏向西方", correct: "a", cat: "science", tag: "科學常識" },
    { q: "「鑑窪」(凹面鏡) 照人面時影像會？", a: "影像變大", b: "影像變小", correct: "a", cat: "science", tag: "科學常識" },
    { q: "古代製作小鏡使其表面「微凸」目的是？", a: "納入完整臉部影像", b: "放大細節", correct: "a", cat: "science", tag: "科學常識" },
    { q: "范仲淹在荒災時採取的策略是？", a: "鼓勵競渡並大興佛事", b: "嚴禁民間娛樂", correct: "a", cat: "logic", tag: "文意理解" },
    { q: "「以工代賑」的直接效果是？", a: "使勞動者有工作獲食糧", b: "讓官府省錢", correct: "a", cat: "logic", tag: "文意理解" },
    { q: "沈括發現指南針偏角是科學史上哪種記錄？", a: "磁偏角", b: "磁極反轉", correct: "a", cat: "science", tag: "科學常識" }
    // ... 更多題目以此類推
];

// 隨機選20題 (若庫不夠則全選)
const selectedQuestions = fullBank.sort(() => 0.5 - Math.random()).slice(0, 20);
const listEl = document.getElementById('questions-list');

selectedQuestions.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.innerHTML = `<span class="tag tag-${item.cat}">${item.tag}</span><div style="font-weight:bold;margin-bottom:10px">${i+1}. ${item.q}</div>
        <div class="options">
            <button onclick="pick(${i}, '${item.a}', this)">${item.a}</button>
            <button onclick="pick(${i}, '${item.b}', this)">${item.b}</button>
        </div>`;
    listEl.appendChild(card);
    item.userChoice = "";
});

function pick(i, val, btn) {
    selectedQuestions[i].userChoice = val;
    Array.from(btn.parentElement.children).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
}

function calculateScore() {
    const name = document.getElementById('student-name').value;
    if (!name) { alert("請輸入姓名！"); return; }

    let score = 0;
    selectedQuestions.forEach(item => {
        const correctText = (item.correct === 'a' ? item.a : item.b);
        if (item.userChoice === correctText) score += (100 / selectedQuestions.length);
    });

    // --- 請修改這裡的 ID ---
    const formID = "1ZwBMDESr90xe-FGF5OeXpGmn-E_D5nWvjSjCh1rCkp0"; 
    const entryName = "entry.671057962"; 
    const entryScore = "entry.1155901214";
    // -----------------------

    const url = `https://docs.google.com/forms/d/e/${formID}/formResponse?${entryName}=${encodeURIComponent(name)}&${entryScore}=${Math.round(score)}&submit=Submit`;
    
    fetch(url, { mode: 'no-cors' });
    
    document.getElementById('quiz-container').style.display = 'none';
    document.getElementById('result-area').style.display = 'block';
    document.getElementById('final-score').innerText = Math.round(score);
}
</script>
</body>
</html>
